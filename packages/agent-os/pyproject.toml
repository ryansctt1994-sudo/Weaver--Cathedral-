[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "weaver-cathedral-agent-os"
version = "0.2.0"
description = "Governed multi-agent orchestration with evidence-bound execution"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = ["weaver-assurance-core>=0.2.0"]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.6"]

[project.scripts]
weaver-agent = "weaver_agent.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

