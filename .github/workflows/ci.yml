name: CI

on:
  push:
    branches: ["main", "phase-1-authority-spine", "feat/e3-authority-receipts"]
  pull_request:
    branches: ["main"]

jobs:
  authority-spine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run authority receipt bundle demo
        run: bash forge/demos/authority_spine_001/scripts/replay_demo.sh
